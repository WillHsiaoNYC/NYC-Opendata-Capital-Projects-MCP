# Hand-curated dictionary of NYC agencies for the OD_CPD agency resolver.
#
# Purpose: power "what is <agency>?" answers and resolve user-typed agency
# names/acronyms to the canonical `managing_agency` value used by the NYC
# Capital Projects datasets on Socrata (fb86-vt7u et al.).
#
# JOIN KEY: `cpdw_acronym` is the value that appears in the datasets'
# `managing_agency` column (= the "CPDW Acronym" of the backend FMS_Agency
# table). Entries WITHOUT a `cpdw_acronym` are dictionary-only: real NYC
# entities that never appear as a capital-project managing agency (most
# mayoral offices, oversight boards, courts). They still answer "what is X?".
#
# CPD-ACTIVE TAGGING IS RUNTIME, NOT STATIC: the MCP intersects this dict with
# live data at startup to learn which agencies actually have projects (and
# their counts). Do NOT bake project counts or an `active` flag into this file
# — it would go stale on every data refresh. As of the 2026-05 research pass,
# only 25 agencies were live (big builders: DPR, DDC, DOT, DEP, EDC, DCAS,
# HHC, CUNY; long tail after).
#
# NOTE: the 3-digit numeric FMS agency code (e.g. 040=DOE) is backend-only and
# NOT published in the public datasets, so it is intentionally absent here.
#
# Slug convention: lowercase abbreviation when well-known and non-ambiguous,
# else kebab-case. Aliases should include the common acronym, the full legal
# name, and any CPD-side label so the resolver matches user phrasing and live
# `managing_agency` strings alike.
acs:
  display: "Administration for Children's Services"
  cpdw_acronym: "ACS"
  aliases: ["ACS", "Administration for Children's Services"]

bic:
  display: "Business Integrity Commission"
  cpdw_acronym: "BIC"
  aliases: ["BIC", "Business Integrity Commission"]

boe:
  display: "Board of Elections"
  cpdw_acronym: "BOE"
  aliases: ["BOE", "Board of Elections"]

cau:
  display: "Community Affairs Unit"
  aliases: ["Community Affairs Unit"]

ccrb:
  display: "Civilian Complaint Review Board"
  cpdw_acronym: "CCRB"
  aliases: ["CCRB", "Civilian Complaint Review Board"]

nyc-opportunity:
  display: "Mayor's Office for Economic Opportunity"
  aliases: ["NYC Opportunity", "Mayor's Office for Economic Opportunity"]

counsel-to-the-mayor:
  display: "Counsel to the Mayor"
  aliases: ["Counsel to the Mayor"]

cuny:
  display: "City University of New York"
  cpdw_acronym: "CUNY"
  aliases: ["CUNY", "City University of New York"]

dcwp:
  # Renamed from "Department of Consumer Affairs" (DCA) in 2020. Bills before
  # 2020 cite DCA; after, DCWP. Merged into one entry so a query for either
  # name returns the agency's full history.
  display: "Department of Consumer and Worker Protection"
  cpdw_acronym: "DCA"
  # cpdw_acronym DCA: FMS still publishes under the pre-2020 "Department of Consumer Affairs" code.
  aliases:
    - "DCWP"
    - "Department of Consumer and Worker Protection"
    - "DCA"
    - "Department of Consumer Affairs"

# role_default: "managing" marks the three construction-manager-as-a-service agencies
# (DDC, DCAS, EDC) whose "their projects" question means what they BUILD, not own.
# Absent => "sponsor" (owner view). Drives agency_dim.role_default; see docs/FEATURES.md §4.
dcas:
  display: "Department of Citywide Administrative Services"
  cpdw_acronym: "DCAS"
  role_default: managing
  aliases: ["DCAS", "Department of Citywide Administrative Services"]

dcla:
  display: "Department of Cultural Affairs"
  cpdw_acronym: "DCLA"
  aliases: ["DCLA", "Department of Cultural Affairs"]

dcp:
