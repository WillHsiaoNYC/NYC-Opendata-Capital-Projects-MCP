hh:
  # ONE entity, two names people use interchangeably: the older legal name
  # "Health and Hospitals Corporation" (HHC) and the post-~2015 rebrand
  # "NYC Health + Hospitals" (H+H). Merged so a query for either resolves to
  # the agency's full history. Live CPD data still keys it as managing_agency
  # ="HHC" (a major capital builder) — hence cpdw_acronym below.
  display: "NYC Health + Hospitals"
  cpdw_acronym: "HHC"
  aliases:
    - "H+H"
    - "HHC"
    - "NYC Health + Hospitals"
    - "Health + Hospitals"
    - "Health and Hospitals"
    - "Health and Hospitals Corporation"
    - "NYC H+H"

