  # FMS dimension files DOSBS (Small Business Services) under the "EDC"
  # acronym, and live data exposes only "EDC" (= Economic Development
  # Corporation, see `edc`). SBS-managed capital, if any, is therefore not
  # separable from EDC in public data — we do NOT equate SBS with EDC.
