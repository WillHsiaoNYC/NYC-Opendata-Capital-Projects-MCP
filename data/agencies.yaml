  # Business Services, see `sbs`) under this same "EDC" acronym, so any
  # SBS-managed capital is indistinguishable from EDC in public data —
  # a known limitation, not an equivalence.
  aliases: ["EDC", "Economic Development Corporation"]

fdny:
